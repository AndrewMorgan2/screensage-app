site_name: ScreenSage
site_description: A web-based control center for tabletop RPG management and multimedia display.
docs_dir: docs
site_dir: site

theme:
  name: material
  logo: images/new_logo.png
  favicon: images/new_logo.png
  palette:
    scheme: slate
    primary: deep purple
    accent: blue
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight

nav:
  - Overview: index.md
  - Installation: INSTALLATION.md
  - Features: FEATURES.md
  - WiFi Hotspot: WIFI_HOTSPOT_SETUP.md
  - Useful Commands: USEFUL_COMMANDS.md
  - ScryingGlass Display Engine: ScryingGlass_pyglet/README.md
  - SageSlate E-Ink Hardware: SAGESLATE_HARDWARE.md
  - Backend (Rust): src/code_documentation.md
  - Frontend (JS): static/code_documetation.md
  - Display Engine Internals: ScryingGlass_pyglet/IMPLEMENTATION_SUMMARY.md
  - Roadmap: TODO.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - toc:
      permalink: true
