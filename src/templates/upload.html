<div class="upload-container">
    <h1>Upload Images</h1>

    <div class="upload-section">
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p>Drag and drop images here</p>
            <p class="upload-hint">or</p>
            <label for="fileInput" class="upload-button">Choose Files</label>
            <input type="file" id="fileInput" accept="image/*" multiple hidden>
            <p class="upload-info">Supports: JPG, PNG, GIF, WebP</p>
        </div>
    </div>

    <div class="upload-progress" id="uploadProgress" style="display: none;">
        <h3>Uploading...</h3>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p id="progressText">0%</p>
    </div>

    <div class="upload-results" id="uploadResults">
        <!-- Upload results will be displayed here -->
    </div>
</div>

<div class="upload-container" style="margin-top: 30px;">
    <h2>File Manager</h2>
    <p style="color:#999; font-size:13px;">Browse and move uploaded files to another location.</p>

    <div class="fm-layout">

        <!-- Source panel -->
        <div class="fm-panel">
            <div class="fm-panel-header">
                <span class="fm-panel-label">Source</span>
                <span class="fm-path" id="fmSrcPath">/home/amorgan/Github/Upload</span>
            </div>
            <div class="fm-list" id="fmSrcList">Loading...</div>
        </div>

        <!-- Action column -->
        <div class="fm-actions">
            <div class="fm-selected" id="fmSelectedDisplay">No file selected</div>
            <button class="fm-move-btn" id="fmMoveBtn" disabled>Move →</button>
            <div class="fm-status" id="fmStatus"></div>
        </div>

        <!-- Destination panel -->
        <div class="fm-panel">
            <div class="fm-panel-header">
                <span class="fm-panel-label">Destination</span>
                <span class="fm-path" id="fmDstPath">/home/amorgan/Github/Upload</span>
            </div>
            <div class="fm-list" id="fmDstList">Loading...</div>
        </div>

    </div>
</div>

<style>
.fm-layout {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: start;
}

.fm-panel {
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    overflow: hidden;
    background: #1a1a1a;
}

.fm-panel-header {
    background: #252525;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    border-bottom: 1px solid #3a3a3a;
}

.fm-panel-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
}

.fm-path {
    font-size: 12px;
    color: var(--primary-color);
    font-family: monospace;
    word-break: break-all;
}

.fm-list {
    max-height: 340px;
    overflow-y: auto;
}

.fm-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    cursor: pointer;
    font-size: 13px;
    color: #ccc;
    border-bottom: 1px solid #222;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.fm-item:hover { background: #2a2a2a; }
.fm-item.selected { background: #1e3a5f; color: #fff; }

.fm-item-icon { flex-shrink: 0; font-size: 14px; }

.fm-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding-top: 48px;
}

.fm-selected {
    font-size: 12px;
    color: #aaa;
    text-align: center;
    max-width: 120px;
    word-break: break-all;
}

.fm-move-btn {
    padding: 8px 16px;
    background: var(--primary-color);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
}

.fm-move-btn:disabled {
    background: #444;
    cursor: not-allowed;
}

.fm-move-btn:not(:disabled):hover { opacity: 0.85; }

.fm-status {
    font-size: 12px;
    text-align: center;
    max-width: 120px;
    min-height: 16px;
}

.fm-status.ok  { color: #4caf50; }
.fm-status.err { color: #f44336; }
</style>

<script>
(function () {
    const UPLOAD_DIR = '/home/amorgan/Github/Upload';

    let srcPath = UPLOAD_DIR;
    let dstPath = UPLOAD_DIR;
    let selectedFile = null; // full path of the selected file

    const srcList     = document.getElementById('fmSrcList');
    const dstList     = document.getElementById('fmDstList');
    const srcPathEl   = document.getElementById('fmSrcPath');
    const dstPathEl   = document.getElementById('fmDstPath');
    const selectedEl  = document.getElementById('fmSelectedDisplay');
    const moveBtn     = document.getElementById('fmMoveBtn');
    const statusEl    = document.getElementById('fmStatus');

    async function listDir(path) {
        const res = await fetch(`/api/images/list?path=${encodeURIComponent(path)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    }

    async function renderPanel(panel, path, isSrc) {
        panel.textContent = 'Loading...';
        try {
            const data = await listDir(path);
            panel.innerHTML = '';

            for (const item of data.items) {
                const el = document.createElement('div');
                el.className = 'fm-item';
                el.innerHTML = `<span class="fm-item-icon">${item.is_dir ? '📁' : '📄'}</span><span>${item.name}</span>`;

                if (item.is_dir) {
                    el.addEventListener('click', () => {
                        if (isSrc) { srcPath = item.path; renderSrc(); }
                        else       { dstPath = item.path; renderDst(); }
                    });
                } else if (isSrc) {
                    el.addEventListener('click', () => {
                        // Deselect previous
                        srcList.querySelectorAll('.fm-item.selected').forEach(e => e.classList.remove('selected'));
                        el.classList.add('selected');
                        selectedFile = item.path;
                        selectedEl.textContent = item.name;
                        moveBtn.disabled = false;
                        statusEl.textContent = '';
                        statusEl.className = 'fm-status';
                    });
                }

                panel.appendChild(el);
            }

            if (panel.children.length === 0) {
                panel.innerHTML = '<div class="fm-item" style="color:#666;cursor:default;">Empty folder</div>';
            }
        } catch (e) {
            panel.innerHTML = `<div class="fm-item" style="color:#f44336;cursor:default;">Error: ${e.message}</div>`;
        }
    }

    function renderSrc() { srcPathEl.textContent = srcPath; renderPanel(srcList, srcPath, true); }
    function renderDst() { dstPathEl.textContent = dstPath; renderPanel(dstList, dstPath, false); }

    moveBtn.addEventListener('click', async () => {
        if (!selectedFile) return;
        const filename = selectedFile.split('/').pop();
        const dest = `${dstPath}/${filename}`;

        moveBtn.disabled = true;
        statusEl.textContent = 'Moving...';
        statusEl.className = 'fm-status';

        try {
            const res = await fetch('/api/files/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ from: selectedFile, to: dest })
            });
            const data = await res.json();

            if (data.success) {
                statusEl.textContent = 'Moved!';
                statusEl.className = 'fm-status ok';
                selectedFile = null;
                selectedEl.textContent = 'No file selected';
                renderSrc();
                renderDst();
            } else {
                statusEl.textContent = data.error || 'Failed';
                statusEl.className = 'fm-status err';
                moveBtn.disabled = false;
            }
        } catch (e) {
            statusEl.textContent = e.message;
            statusEl.className = 'fm-status err';
            moveBtn.disabled = false;
        }
    });

    renderSrc();
    renderDst();
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const uploadProgress = document.getElementById('uploadProgress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const uploadResults = document.getElementById('uploadResults');

    const STORAGE_KEY = 'uploadHistory';
    const DIRECTORY_KEY = 'mediaDirectory';
    const UPLOAD_DIR = '/home/amorgan/Github/Upload';

    // Save upload directory to localStorage so Media tab shows it
    localStorage.setItem(DIRECTORY_KEY, UPLOAD_DIR);

    // Load previous upload results from localStorage
    loadUploadHistory();

    // Listen for storage changes from other tabs
    window.addEventListener('storage', function(e) {
        if (e.key === STORAGE_KEY) {
            console.log('Storage changed in another tab, reloading results');
            loadUploadHistory();
        }
    });

    // Click to select files - but not if clicking the label or button
    uploadArea.addEventListener('click', (e) => {
        // Only trigger if clicking the upload area itself, not the label
        if (e.target === uploadArea || e.target.classList.contains('upload-icon') || e.target.tagName === 'P') {
            fileInput.click();
        }
    });

    // Prevent default drag behaviors
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        uploadArea.addEventListener(eventName, preventDefaults, false);
        document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    // Highlight drop area when item is dragged over it
    ['dragenter', 'dragover'].forEach(eventName => {
        uploadArea.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        uploadArea.addEventListener(eventName, unhighlight, false);
    });

    function highlight(e) {
        uploadArea.classList.add('dragover');
    }

    function unhighlight(e) {
        uploadArea.classList.remove('dragover');
    }

    // Handle dropped files
    uploadArea.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        handleFiles(files);
    }

    // Handle selected files
    fileInput.addEventListener('change', function(e) {
        handleFiles(this.files);
    });

    function loadUploadHistory() {
        try {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            uploadResults.innerHTML = '';

            // Display each saved result
            history.forEach(item => {
                displayResult(item.filename, item.success, item.message, item.path);
            });

            console.log('Loaded', history.length, 'items from upload history');
        } catch (error) {
            console.error('Error loading upload history:', error);
        }
    }

    function saveToHistory(filename, success, message, path) {
        try {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

            // Add new item to the beginning of the array
            history.unshift({
                filename,
                success,
                message,
                path,
                timestamp: new Date().toISOString()
            });

            // Keep only the last 50 uploads to prevent localStorage from growing too large
            if (history.length > 50) {
                history.splice(50);
            }

            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            console.log('Saved to history:', filename);
        } catch (error) {
            console.error('Error saving to history:', error);
        }
    }

    async function handleFiles(files) {
        if (files.length === 0) return;

        // Show progress
        uploadProgress.style.display = 'block';

        const filesArray = Array.from(files);
        let completed = 0;

        for (const file of filesArray) {
            await uploadFile(file);
            completed++;
            const progress = Math.round((completed / filesArray.length) * 100);
            progressFill.style.width = progress + '%';
            progressText.textContent = progress + '%';
        }

        // Hide progress after completion
        setTimeout(() => {
            uploadProgress.style.display = 'none';
            progressFill.style.width = '0%';
            progressText.textContent = '0%';
        }, 1000);
    }

    async function uploadFile(file) {
        try {
            console.log('Starting upload for:', file.name, 'Type:', file.type, 'Size:', file.size);

            // Validate file type - allow if type is image/* or if type is empty but filename suggests image
            const hasImageType = file.type && file.type.startsWith('image/');
            const hasImageExtension = /\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i.test(file.name);

            if (!hasImageType && !hasImageExtension) {
                console.warn('Invalid file type:', file.type, 'File name:', file.name);
                addResult(file.name, false, 'Not an image file');
                return;
            }

            console.log('File validation passed - Type:', file.type || 'unknown', 'Has image extension:', hasImageExtension);

            console.log('Reading file as ArrayBuffer...');
            const arrayBuffer = await file.arrayBuffer();
            console.log('File read successfully, size:', arrayBuffer.byteLength, 'bytes');

            // Determine content type - use file.type if available, otherwise guess from extension
            let contentType = file.type;
            if (!contentType) {
                if (/\.jpe?g$/i.test(file.name)) contentType = 'image/jpeg';
                else if (/\.png$/i.test(file.name)) contentType = 'image/png';
                else if (/\.gif$/i.test(file.name)) contentType = 'image/gif';
                else if (/\.webp$/i.test(file.name)) contentType = 'image/webp';
                else contentType = 'image/jpeg'; // Default to JPEG
                console.log('Guessed content type from filename:', contentType);
            }

            console.log('Sending POST request to /api/upload/image');
            const response = await fetch('/api/upload/image', {
                method: 'POST',
                body: arrayBuffer,
                headers: {
                    'Content-Type': contentType
                }
            });

            console.log('Response received, status:', response.status, response.statusText);

            if (!response.ok) {
                const errorText = await response.text();
                console.error('Upload failed with status:', response.status, 'Error:', errorText);
                addResult(file.name, false, `Upload failed: ${response.status} ${response.statusText}`);
                return;
            }

            const result = await response.json();
            console.log('Upload result:', result);

            if (result.success) {
                console.log('Upload successful:', result.path);
                addResult(file.name, true, 'Uploaded successfully', result.path);
            } else {
                console.error('Upload failed:', result.message);
                addResult(file.name, false, result.message || 'Upload failed');
            }
        } catch (error) {
            console.error('Upload error:', error);
            addResult(file.name, false, 'Upload failed: ' + error.message);
        }
    }

    function addResult(filename, success, message, path) {
        // Save to history
        saveToHistory(filename, success, message, path);

        // Display the result
        displayResult(filename, success, message, path);
    }

    function displayResult(filename, success, message, path) {
        const resultItem = document.createElement('div');
        resultItem.className = 'upload-result-item ' + (success ? 'success' : 'error');

        let content = `
            <div class="result-icon">${success ? '✓' : '✗'}</div>
            <div class="result-filename">${filename}</div>
            <div class="result-status ${success ? 'success' : 'error'}">${message}</div>
        `;

        if (success && path) {
            content += `<div class="result-path">✓ Uploaded</div>`;
        }

        resultItem.innerHTML = content;

        // Insert at the beginning so newest uploads appear first
        if (uploadResults.firstChild) {
            uploadResults.insertBefore(resultItem, uploadResults.firstChild);
        } else {
            uploadResults.appendChild(resultItem);
        }
    }
});
</script>
