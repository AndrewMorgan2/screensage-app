<div class="rules-page" data-rules-dir="{{RULES_DIR}}">

    <!-- Voice control panel -->
    <div class="command-card voice-panel">
        <div class="voice-status-row">
            <span id="voiceIndicator" class="status-dot"></span>
            <span id="voiceStatusText">Not listening</span>
        </div>
        <div class="voice-controls">
            <button id="toggleListenBtn" class="primary-btn">Start Listening</button>
            <label for="systemSelect" class="inline-label">System:</label>
            <select id="systemSelect" class="dropdown inline-select">
                <option value="">All Systems</option>
            </select>
            <label for="cooldownSelect" class="inline-label">Repeat delay:</label>
            <select id="cooldownSelect" class="dropdown inline-select">
                <option value="10000">10 s</option>
                <option value="20000" selected>20 s</option>
                <option value="45000">45 s</option>
                <option value="120000">2 min</option>
            </select>
        </div>
        <div class="transcript-box">
            <strong>Heard:</strong> <span id="transcriptText">&mdash;</span>
        </div>
        <div id="voiceUnsupported" class="error voice-warning" style="display:none;">
            Speech recognition isn't supported in this browser. Try Chrome or Edge, accessed via
            <code>http://localhost:8080</code>.
        </div>
        <div id="voiceError" class="error voice-warning" style="display:none;"></div>
    </div>

    <!-- Matched rule display — hidden until a keyword is detected -->
    <div id="currentRule" style="display:none;">
        <div class="current-rule-card">
            <div class="current-rule-header">
                <h2 id="currentRuleName"></h2>
                <span id="currentRuleBadge" class="rule-badge"></span>
            </div>
            <div id="currentRuleMeta" class="current-rule-meta"></div>
            <p id="currentRuleDescription" class="current-rule-description"></p>
        </div>
    </div>

</div>

<style>
.rules-page .command-card {
    margin-bottom: 20px;
}

/* Voice panel */
.voice-status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1rem;
    margin-bottom: 12px;
}

.status-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background-color: var(--error-color);
    display: inline-block;
    flex-shrink: 0;
}

.status-dot.listening {
    background-color: var(--success-color);
    animation: rules-pulse 1.5s infinite;
}

@keyframes rules-pulse {
    0%   { box-shadow: 0 0 0 0   rgba(76, 175, 80, 0.6); }
    70%  { box-shadow: 0 0 0 8px rgba(76, 175, 80, 0);   }
    100% { box-shadow: 0 0 0 0   rgba(76, 175, 80, 0);   }
}

.voice-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
}

.inline-label {
    color: var(--secondary-text);
}

.inline-select {
    width: auto;
}

.transcript-box {
    background-color: #222222;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    padding: 10px;
    color: var(--secondary-text);
    min-height: 24px;
}

#transcriptText {
    color: var(--text-color);
}

.voice-warning {
    margin-top: 10px;
    display: block;
}

/* Matched rule card */
.current-rule-card {
    background-color: var(--card-bg-color);
    border: 2px solid var(--primary-color);
    border-radius: 8px;
    padding: 28px 32px;
    box-shadow: 0 4px 20px rgba(68, 131, 182, 0.25);
    animation: rule-appear 0.2s ease-out;
}

@keyframes rule-appear {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0);    }
}

.current-rule-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 6px;
}

.current-rule-header h2 {
    margin: 0;
    font-size: 2rem;
}

.rule-badge {
    background-color: var(--primary-color);
    color: white;
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 0.85rem;
    white-space: nowrap;
}

.current-rule-meta {
    color: var(--secondary-text);
    font-size: 0.9rem;
    margin-bottom: 18px;
}

.current-rule-description {
    font-size: 1.15rem;
    line-height: 1.65;
    margin: 0;
}
</style>
