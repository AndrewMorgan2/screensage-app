<div class="container">
    <div class="draw-container">
        <!-- Drawing Canvas Area -->
        <div class="draw-canvas-wrapper">
            <canvas id="drawCanvas" width="1920" height="1080"></canvas>
        </div>

        <!-- Controls -->
        <div class="draw-controls">
            <div class="control-group">
                <label for="brushColor">Color:</label>
                <input type="color" id="brushColor" value="#000000">
            </div>

            <div class="control-group">
                <label for="brushSize">Brush Size: <span id="brushSizeValue">5</span></label>
                <input type="range" id="brushSize" min="1" max="50" value="5">
            </div>

            <div class="control-group">
                <label for="targetSelect">Target:</label>
                <select id="targetSelect">
                    <option value="display">Display</option>
                    <option value="battlemap">Battlemap</option>
                </select>
            </div>

            <div class="control-group checkbox">
                <label>
                    <input type="checkbox" id="loadBackgroundCheck" checked>
                    Load Background
                </label>
            </div>

            <div class="control-group buttons">
                <button id="loadPreviewBtn" class="secondary-btn">Load Preview</button>
                <button id="clearBtn" class="secondary-btn">Clear</button>
                <button id="undoBtn" class="secondary-btn">Undo</button>
                <button id="runDrawBtn" class="primary-btn">Run Draw</button>
            </div>

            <div class="control-group status">
                <span id="drawStatus"></span>
            </div>
        </div>
    </div>
</div>

<style>
    .draw-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 20px;
    }

    .draw-canvas-wrapper {
        border: 2px solid #444;
        border-radius: 8px;
        overflow: hidden;
        background: #ffffff;
        max-width: 100%;
        aspect-ratio: 16/9;
    }

    #drawCanvas {
        width: 100%;
        height: 100%;
        cursor: crosshair;
        display: block;
    }

    .draw-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: center;
        padding: 15px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
    }

    .control-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .control-group label {
        color: #ccc;
        font-size: 14px;
    }

    .control-group.buttons {
        margin-left: auto;
    }

    #brushColor {
        width: 50px;
        height: 35px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    #brushSize {
        width: 150px;
    }

    #targetSelect {
        padding: 8px 12px;
        border-radius: 4px;
        border: 1px solid #555;
        background: #333;
        color: #fff;
        font-size: 14px;
    }

    #runDrawBtn.active {
        background: #4CAF50;
        box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
    }

    .control-group.status {
        margin-left: 10px;
    }

    #drawStatus {
        color: #4CAF50;
        font-size: 14px;
        font-weight: bold;
    }

    .control-group.checkbox label {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #ccc;
        font-size: 14px;
        cursor: pointer;
    }

    .control-group.checkbox input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
    }
</style>
