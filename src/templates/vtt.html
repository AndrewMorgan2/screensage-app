<div class="vtt-layout">

    <!-- Button toolbar -->
    <div class="element-buttons">
        <button id="addTokenBtn"    class="primary-btn">Add Token</button>
        <button id="addAreaBtn"     class="primary-btn">Add Area</button>
        <button id="addTextBtn"     class="primary-btn">Add Text</button>
        <button id="addLineBtn"     class="primary-btn">Add Line</button>
        <button id="addConeBtn"     class="primary-btn">Add Cone</button>
        <button id="addBarBtn"      class="primary-btn">Add Bar</button>
        <button id="addFogBtn"      class="secondary-btn">Add Fog</button>
        <button id="resetFogBtn"    class="secondary-btn">Reset Fog</button>
        <button id="removeFogBtn"   class="secondary-btn">Remove Fog</button>
        <button id="collapseAllBtn" class="secondary-btn">Collapse All</button>
    </div>

    <!-- Preview window -->
    <div id="previewArea" style="position: relative;">
        <div id="previewScalePanel" style="position: absolute; top: 10px; left: 10px; z-index: 10000; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px;">
            <div id="previewScaleContent" style="display: flex; align-items: center; gap: 10px;">
                <label style="color: white; font-size: 12px;">Preview Scale:</label>
                <input type="range" id="previewScaleSlider" min="10" max="150" value="100" step="5" style="width: 150px;">
                <span id="previewScaleDisplay" style="color: white;">100%</span>
            </div>
            <button id="minimizeScaleBtn" style="position: absolute; top: 5px; right: 5px; padding: 2px 8px; font-size: 14px; font-weight: bold;" title="Minimize">−</button>
        </div>
    </div>

    <!-- Last moved element -->
    <div id="lastMovedSection" style="display:none;">
        <div id="lastMovedContent"></div>
    </div>

    <!-- Element controls -->
    <details class="collapsible-section">
        <summary class="collapsible-toggle">Elements</summary>
        <div class="collapsible-content">
            <div id="controlsArea">
                <p>Controls will appear here after parsing JSON...</p>
            </div>
        </div>
    </details>

    <!-- Collapsible: JSON Editor -->
    <details class="collapsible-section">
        <summary class="collapsible-toggle">JSON Editor</summary>
        <div class="collapsible-content">
            <textarea id="jsonInput" placeholder="Enter your JSON configuration here..."> </textarea>
            <div class="save-container">
                <input type="text" id="saveFilename" placeholder="filename.json" />
                <button id="saveFileBtn" class="action-button">Save Current JSON</button>
                <button id="parseButton">Parse JSON &amp; Generate Controls</button>
                <p id="jsonError" class="error"></p>
            </div>
        </div>
    </details>

    <!-- Collapsible: Saved JSONs -->
    <details class="collapsible-section">
        <summary class="collapsible-toggle">Saved JSONs</summary>
        <div class="collapsible-content">
            <div class="file-browser" id="fileBrowser"></div>
        </div>
    </details>

</div>

<script>
document.addEventListener('vttElementMoved', function(e) {
    const el = e.detail.element;
    const section = document.getElementById('lastMovedSection');
    const content = document.getElementById('lastMovedContent');
    const module  = window.controlsModule;
    if (!section || !content || !module) return;

    content.innerHTML = '';

    // Find this element's index in the current JSON so the control title is accurate
    let index = 0;
    try {
        const jsonData = JSON.parse(module.elements.jsonInput.value);
        const found = jsonData.elements.findIndex(elem => elem.id === el.id);
        if (found !== -1) index = found;
    } catch {}

    // Temporarily redirect controlsArea so generateControlsForElement appends here
    const savedArea = module.elements.controlsArea;
    module.elements.controlsArea = content;
    module.generateControlsForElement(el, index);
    module.elements.controlsArea = savedArea;

    section.style.display = '';
});
</script>
